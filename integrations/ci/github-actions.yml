# review-gate — CI companion (un-bypassable enforcement).
#
# The local git hook is an HONESTY gate: it can be bypassed with `--no-verify`.
# This workflow re-runs the SAME verify commands from .review-gate/gate.config.json
# in CI, where they can't be skipped — so a bypassed local commit still fails the
# pull request. Copy this file to .github/workflows/review-gate.yml in your repo
# and adjust the runtime setup (Node/Python/Go/...) to your stack.
name: review-gate verify
on:
  pull_request:
  push:
    branches: [main, master]
jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      # --- set up YOUR toolchain here (uncomment what applies) ---
      # - uses: actions/setup-node@v4
      #   with: { node-version: 20 }
      # - run: npm ci
      # - uses: actions/setup-python@v5
      #   with: { python-version: '3.12' }
      # - run: pip install -r requirements.txt
      # - uses: actions/setup-go@v5
      #   with: { go-version: '1.22' }

      - name: Run review-gate verify (typecheck + lint + test)
        # ci-verify re-runs the same config-driven verify the local gate uses
        # (shared logic in review-gate.sh; same Node defaults when omitted). It
        # HONORS perFile — perFile commands run on the PR's changed files, others
        # whole-project — so CI matches local attest instead of diverging.
        # It enforces the VERIFY step; it does not prove a human/agent reviewed.
        run: bash .review-gate/review-gate.sh ci-verify
