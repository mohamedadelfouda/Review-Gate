# review-gate self-check — dogfoods ci-verify (which runs this repo's own
# gate.config.json verify: tests/verify.sh shell-syntax + tests/smoke.sh).
name: verify
on: [push, pull_request]
jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - name: review-gate ci-verify (shell syntax + smoke test)
        # this repo dogfoods from source (no installed .review-gate/review-gate.sh copy)
        run: bash gate/review-gate.sh ci-verify
